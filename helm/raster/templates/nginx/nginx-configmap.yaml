{{- if .Values.nginx.enabled -}}
{{- $chartName := include "pycsw.name" . -}}
{{- $releaseName := .Release.Name -}}
{{- $nginxConfigmapName := include "nginx-configmap.fullname" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $nginxConfigmapName }}
  labels:
    app: {{ $releaseName }}-{{ $chartName }}
    component: nginx-configmap
    environment: {{ .Values.environment }}
    release: {{ $releaseName }}
data:
  pycsw-location.conf: {{ tpl (.Files.Get "config/pycsw-location.conf") . | quote }}
  pycsw-server.conf: {{ tpl (.Files.Get "config/pycsw-server.conf") . | quote }}
  log_format.conf: {{ tpl (.Files.Get "config/log_format.conf") . | quote }}
{{- end }}
